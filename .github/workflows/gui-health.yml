name: GUI Health Check

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-xvfb:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $VM_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Check VM connectivity
        id: check-vm-connectivity
        env:
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          echo '=== Checking VM connectivity ==='
          if timeout 10 ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no $VM_USER@$VM_HOST "echo OK" 2>/dev/null; then
            echo "VM at $VM_HOST is reachable. Proceeding with health checks."
            echo "reachable=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::VM at $VM_HOST is not reachable from GitHub Actions."
            echo "::warning::This is expected if the target is a local VM (192.168.x.x) not exposed to the internet."
            echo "::warning::Skipping GUI health checks for this run."
            echo "reachable=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Xvfb process
        if: steps.check-vm-connectivity.outputs.reachable == 'true'
        env:
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          ssh $VM_USER@$VM_HOST 'pgrep -a Xvfb || echo "Xvfb not running"'

      - name: Check DISPLAY accessibility
        if: steps.check-vm-connectivity.outputs.reachable == 'true'
        env:
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          ssh $VM_USER@$VM_HOST 'DISPLAY=:99 xdpyinfo | grep dimensions || echo "Display :99 not accessible"'

  check-atspi:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $VM_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Check VM connectivity
        id: check-vm-connectivity
        env:
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          echo '=== Checking VM connectivity ==='
          if timeout 10 ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no $VM_USER@$VM_HOST "echo OK" 2>/dev/null; then
            echo "VM at $VM_HOST is reachable. Proceeding with health checks."
            echo "reachable=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::VM at $VM_HOST is not reachable from GitHub Actions."
            echo "::warning::This is expected if the target is a local VM (192.168.x.x) not exposed to the internet."
            echo "::warning::Skipping GUI health checks for this run."
            echo "reachable=false" >> $GITHUB_OUTPUT
          fi

      - name: Check AT-SPI2 registry
        if: steps.check-vm-connectivity.outputs.reachable == 'true'
        env:
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          ssh $VM_USER@$VM_HOST 'pgrep -a at-spi2-registryd || echo "AT-SPI2 registry not running"'

      - name: Check AT-SPI2 bus
        if: steps.check-vm-connectivity.outputs.reachable == 'true'
        env:
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          ssh $VM_USER@$VM_HOST 'gdbus call --session --dest org.a11y.Bus --object-path /org/a11y/bus --method org.freedesktop.DBus.Properties.Get org.a11y.Status IsEnabled || echo "AT-SPI2 bus not responding"'

  check-ocr:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $VM_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Check VM connectivity
        id: check-vm-connectivity
        env:
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          echo '=== Checking VM connectivity ==='
          if timeout 10 ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no $VM_USER@$VM_HOST "echo OK" 2>/dev/null; then
            echo "VM at $VM_HOST is reachable. Proceeding with health checks."
            echo "reachable=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::VM at $VM_HOST is not reachable from GitHub Actions."
            echo "::warning::This is expected if the target is a local VM (192.168.x.x) not exposed to the internet."
            echo "::warning::Skipping GUI health checks for this run."
            echo "reachable=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Tesseract availability
        if: steps.check-vm-connectivity.outputs.reachable == 'true'
        env:
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          ssh $VM_USER@$VM_HOST 'tesseract --version 2>&1 | head -1 || echo "Tesseract not installed"'

      - name: Run OCR test
        if: steps.check-vm-connectivity.outputs.reachable == 'true'
        env:
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          ssh $VM_USER@$VM_HOST 'DISPLAY=:99 python3 -c "
          from mss import mss
          import pytesseract
          with mss(display=\":99\") as sct:
              img = sct.grab(sct.monitors[0])
          text = pytesseract.image_to_string(img)
          print(f\"OCR OK: {len(text)} chars extracted\")
          " 2>&1 || echo "OCR test failed"'

  check-browser:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $VM_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Check VM connectivity
        id: check-vm-connectivity
        env:
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          echo '=== Checking VM connectivity ==='
          if timeout 10 ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no $VM_USER@$VM_HOST "echo OK" 2>/dev/null; then
            echo "VM at $VM_HOST is reachable. Proceeding with health checks."
            echo "reachable=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::VM at $VM_HOST is not reachable from GitHub Actions."
            echo "::warning::This is expected if the target is a local VM (192.168.x.x) not exposed to the internet."
            echo "::warning::Skipping GUI health checks for this run."
            echo "reachable=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Playwright browsers
        if: steps.check-vm-connectivity.outputs.reachable == 'true'
        env:
          VM_HOST: ${{ vars.PRODUCTION_HOST || '192.168.56.101' }}
          VM_USER: ${{ vars.PRODUCTION_USER || 'ubuntu' }}
        run: |
          ssh $VM_USER@$VM_HOST 'python3 -c "
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto(\"about:blank\")
              print(f\"Playwright OK: {page.title()}\")
              browser.close()
          " 2>&1 || echo "Playwright test failed"'

  alert-on-failure:
    if: failure()
    needs: [check-xvfb, check-atspi, check-ocr, check-browser]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create alert issue
        uses: actions/github-script@v7
        with:
          script: |
            const failedJobs = [];
            if ('${{ needs.check-xvfb.result }}' === 'failure') failedJobs.push('Xvfb');
            if ('${{ needs.check-atspi.result }}' === 'failure') failedJobs.push('AT-SPI2');
            if ('${{ needs.check-ocr.result }}' === 'failure') failedJobs.push('OCR');
            if ('${{ needs.check-browser.result }}' === 'failure') failedJobs.push('Browser');

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `GUI stack component(s) down: ${failedJobs.join(', ')}`,
              body: `30-minute GUI health check detected failures in: ${failedJobs.join(', ')}.\n\nCheck logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['gui', 'incident', 'urgent']
            });
