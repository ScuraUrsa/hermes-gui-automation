[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-v --tb=short --strict-markers --strict-config"
timeout = 300
markers =
    smoke: Critical path tests (fast, no external deps)
    unit: Unit tests for individual modules
    integration: Tests requiring real display and tools
    slow: Tests taking >10 seconds
    vlm: Tests requiring VLM models (Florence-2, OmniParser)
    browser: Tests requiring Playwright browsers
    app: Tests requiring real GUI applications
    xvfb: Tests requiring Xvfb display server
